name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check core api main.py tests
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend · build + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps (workspace)
        run: npm ci
      - name: Build (Vite)
        run: npm run build --workspace frontend
      - name: Audit (no rompe el build)
        run: npm audit --omit=dev || true
